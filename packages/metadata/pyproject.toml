[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[project]
name = "tidyforge-metadata"
version = "0.1.0"
description = "File and media metadata extraction for TidyForge"
requires-python = ">=3.11"
dependencies = [
    "tidyforge-core",
]

[project.optional-dependencies]
media = ["pillow>=10.0"]

[tool.uv.sources]
tidyforge-core = { workspace = true }

[tool.hatch.build.targets.wheel]
packages = ["src/tidyforge"]
