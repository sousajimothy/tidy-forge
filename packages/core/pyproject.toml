[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[project]
name = "tidyforge-core"
version = "0.1.0"
description = "Core utilities for TidyForge: settings, logging, models, exceptions"
requires-python = ">=3.11"
dependencies = [
    "pydantic>=2.0",
    "pydantic-settings>=2.0",
    "rich>=13.0",
]

[tool.hatch.build.targets.wheel]
packages = ["src/tidyforge"]
