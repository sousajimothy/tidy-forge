[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[project]
name = "tidyforge-sample-data"
version = "0.1.0"
description = "Sample file generator for TidyForge notebook experimentation"
requires-python = ">=3.11"
dependencies = [
    "tidyforge-core",
]

[tool.uv.sources]
tidyforge-core = { workspace = true }

[tool.hatch.build.targets.wheel]
packages = ["src/tidyforge"]
