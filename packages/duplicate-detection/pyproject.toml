[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[project]
name = "tidyforge-duplicate-detection"
version = "0.1.0"
description = "Hash-based duplicate file detection for TidyForge"
requires-python = ">=3.11"
dependencies = [
    "tidyforge-core",
]

[tool.uv.sources]
tidyforge-core = { workspace = true }

[tool.hatch.build.targets.wheel]
packages = ["src/tidyforge"]
