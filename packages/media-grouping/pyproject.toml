[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[project]
name = "tidyforge-media-grouping"
version = "0.1.0"
description = "Media file grouping strategies for TidyForge"
requires-python = ">=3.11"
dependencies = [
    "tidyforge-core",
    "tidyforge-fs-indexer",
    "tidyforge-metadata",
]

[tool.uv.sources]
tidyforge-core = { workspace = true }
tidyforge-fs-indexer = { workspace = true }
tidyforge-metadata = { workspace = true }

[tool.hatch.build.targets.wheel]
packages = ["src/tidyforge"]
